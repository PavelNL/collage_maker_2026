# collage3.ini — Parameters for collage_generator3.py  (v3 — DPI-agnostic)
#
# KEY DIFFERENCE FROM v2:
#   All layout and decoration dimensions are in physical units (mm), not pixels.
#   The script converts mm → px at startup using the configured DPI.
#   To switch between preview and print quality, change ONLY the dpi value.
#
#   150 dpi = fast preview  (~7 MB PDF for 60cm wide collage)
#   300 dpi = print quality (~28 MB PDF, 2× resolution)
#
# Pass a custom path via: --config /path/to/collage3.ini


[canvas]
# Physical width of the output collage in centimetres (height is auto-calculated)
width_cm = 60.0

# Render resolution in DPI — the ONLY value to change when switching quality.
# All mm dimensions below scale automatically.
#   150 = preview / proofing
#   300 = print quality
dpi = 150

# Background colour as R,G,B.  Ignored when transparent_background = true.
background_color = 255,255,255

# true → RGBA canvas + mask="auto" in PDF for layout tool compositing
transparent_background = false


[layout]
# Image ordering mode: filename | shuffle | manifest
# Auto-detect: if order = filename but order.txt exists, switches to manifest.
order = shuffle

# Seed for shuffle mode.  -1 = different random order every run.
shuffle_seed = 42

# ── Row height (all in mm) ─────────────────────────────────────────────────
# target_row_height_mm is the ideal row height.  The DP solver loads images
# at this height and applies small corrections (typically ±5%) to justify rows.
#
# Physical reference at 60cm canvas width:
#   71mm target → ~7–9 images/row for 3:2 landscape photos   (≈ 420px @ 150dpi)
#   85mm target → ~6–7 images/row                            (≈ 500px @ 150dpi)
#  100mm target → ~5–6 images/row                            (≈ 591px @ 150dpi)
#
# These values are DPI-independent: 71mm looks the same at 150dpi and 300dpi.
target_row_height_mm = 71.0

# Hard bounds — rows outside this range are rejected by the DP solver.
# Set a wide range for flexibility; tighten for visual uniformity.
min_row_height_mm = 55.0
max_row_height_mm = 95.0

# Optional image-count guard per row.  0 = unconstrained (recommended).
min_images_per_row = 0
max_images_per_row = 0

# Horizontal gap between images (mm)
padding_mm = 0.7

# Vertical gap between rows (mm)
row_gap_mm = 0.4


[dp_cost]
# ── DP cost function weights ───────────────────────────────────────────────
# cost = scale_penalty_weight  * (scale - 1.0)^2
#      + height_penalty_weight * ((row_height - target) / target)^2
#      + widows_penalty         (last row with 1 image only)
#
# Tuning:
#   scale_penalty_weight  — higher → images closer to natural size
#   height_penalty_weight — higher → rows closer to target height
#   widows_penalty        — set 0.0 to allow a lone last image
scale_penalty_weight  = 1.0
height_penalty_weight = 1.0
widows_penalty        = 2.0


[decoration]
# White border around each photo (mm).  0.0 = disabled.
border_mm = 0.0

# Rounded corner radius (mm).  0.0 = sharp corners.
# 0.85mm ≈ 5px @ 150dpi, 10px @ 300dpi
corner_radius_mm = 0.85

# Maximum random rotation per image (±degrees).  0.0 = no rotation.
rotation_max_deg = 0.0

# Minimum guaranteed gap between adjacent rotated bounding boxes (mm).
# Prevents rotated corners bleeding into neighbours.
# 0.5mm ≈ 3px @ 150dpi, 6px @ 300dpi
overlap_tolerance_mm = 0.5
