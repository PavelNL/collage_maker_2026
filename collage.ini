# collage.ini — Tuneable parameters for collage_generator.py
# All values can be overridden here without touching the script.
# The script loads this file automatically if it exists in the same directory,
# or you can pass a custom path via: --config /path/to/collage.ini

[canvas]
# Physical width of the output collage in centimetres (height is auto-calculated)
width_cm = 60.0

# Render resolution in DPI.
# 150 = fast preview, 300 = print quality
dpi = 150

# Background colour as R,G,B — e.g. 255,255,255 for pure white.
# Has no effect when transparent_background = true
background_color = 255,255,255

# Set to true to produce a transparent background (RGBA canvas, PNG-backed PDF).
# Useful when the collage will be placed over another background in a layout tool.
transparent_background = false


[layout]
# Target row height as a fraction of the canvas pixel width.
# 0.12 ≈ ~8 images/row at 16:9 aspect; 0.22 ≈ ~4 images/row.
row_target_height = 0.13

# Minimum and maximum number of images forced into each row.
# The greedy packer will enforce these bounds by adjusting image scale per row.
min_images_per_row = 7
max_images_per_row = 8

# Gap between images in pixels (at the configured DPI).
# Set to 0 for no gap; very small values (2–4) give a near-seamless grid.
padding_px = 4

# Vertical gap between rows in pixels. Separate from padding_px so rows
# can be tighter than the horizontal gap.
row_gap_px = 2


[decoration]
# White (or coloured) border around each photo in pixels.
# Set to 0 to disable borders entirely.
border_px = 0

# Rounded corner radius in pixels. Set to 0 for sharp corners.
corner_radius_px = 10

# Maximum random rotation applied to each image, in degrees (±value).
# Set to 0 to disable rotation entirely.
rotation_max_deg = 8
