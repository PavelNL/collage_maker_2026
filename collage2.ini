# collage2.ini — Parameters for collage_generator2.py  (v2 — DP layout)
# All values can be overridden here without touching the script.
# Pass a custom path via: --config /path/to/collage2.ini

[canvas]
# Physical width of the output collage in centimetres (height is auto-calculated)
width_cm = 58.0

# Render resolution in DPI.
# 150 = fast preview, 300 = print quality
dpi = 150

# Background colour as R,G,B.  Ignored when transparent_background = true.
background_color = 255,255,255

# true → RGBA canvas + mask="auto" in PDF (for compositing in layout tools)
transparent_background = false


[layout]
# Image ordering mode: filename | shuffle | manifest
# Auto-detect: if order = filename but order.txt exists, switches to manifest.
order = shuffle

# Seed for shuffle mode.  -1 = different random order every run.
shuffle_seed = 42

# ── DP height parameters ───────────────────────────────────────────────────
# All images are loaded at target_row_height_px.  The DP solver then applies
# a small per-row correction scale (typically 0.95–1.05) to fill the canvas.
# Rows that would require scaling outside [min, max] are rejected as candidates.

# Reference height images are loaded at (pixels).
# This is the "ideal" row height; DP corrections stay close to it.
# At 150 DPI, 60cm canvas ≈ 3543px wide.
# ~400px target → ~8-9 images/row for 3:2 landscape photos.
# 430=>94cm, 420=>
# ~550px target → ~6-7 images/row.
# ~700px target → ~4-5 images/row.
target_row_height_px = 420

# Hard height bounds.  Rows outside this range are never generated.
# Set a wide range (e.g. 200–1200) for maximum DP flexibility.
# Tighten (e.g. 420–540) to enforce visual uniformity.
min_row_height_px = 360
max_row_height_px = 620

# Optional image-count guard per row.  0 = unconstrained (recommended for DP).
# Use sparingly — tight constraints reduce the DP solution space.
min_images_per_row = 0
max_images_per_row = 0

# Horizontal gap between images (pixels at configured DPI).
padding_px = 2

# Vertical gap between rows (pixels at configured DPI).
row_gap_px = 2


[dp_cost]
# ── DP cost function weights ───────────────────────────────────────────────
# The DP minimises:
#   cost = scale_penalty_weight  * (scale - 1.0)^2
#        + height_penalty_weight * ((row_height - target) / target)^2
#        + widows_penalty        (added only to a final row with 1 image)
#
# Tuning guide:
#   scale_penalty_weight  — increase to enforce tighter scale uniformity
#                           (images closer to their natural size).
#                           Decrease to allow more flexible row compositions.
#   height_penalty_weight — increase to keep all rows close to target height.
#                           Decrease to allow more height variation.
#   widows_penalty        — high value strongly discourages a lone last image.
#                           Set to 0.0 to allow it.
#
# Good starting balance: both weights equal, widows high.
scale_penalty_weight  = 1.0
height_penalty_weight = 1.0
widows_penalty        = 2.0


[decoration]
# White border around each photo in pixels.  0 = disabled.
border_px = 0

# Rounded corner radius in pixels.  0 = sharp corners.
corner_radius_px = 5

# Maximum random rotation per image in degrees (±value).  0 = no rotation.
rotation_max_deg = 0

# Hard floor on gap between adjacent rotated bounding boxes (pixels).
# Prevents rotated corners from bleeding into neighbours.
# 2–4 px = "almost touching"; higher = explicit breathing room.
overlap_tolerance_px = 1
